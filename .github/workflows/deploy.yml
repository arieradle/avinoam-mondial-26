name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Commit built files to main (served by GitHub Pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -rf --cached assets/ 2>/dev/null || true
          rm -rf assets/
          cp dist/index.html index.html
          cp -r dist/assets .
          cp dist/.nojekyll .nojekyll 2>/dev/null || touch .nojekyll
          git add index.html assets/ .nojekyll
          git diff --staged --quiet || (git commit -m "deploy: built React app [skip ci]" && git push)
